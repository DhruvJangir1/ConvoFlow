<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConvoFlow — Architecture Board</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d0d14;--surface:#13131d;--border:#2a2a3a;
    --text:#e8e8f0;--text2:#8a8aa0;--text3:#55556a;
    --blue:#4a9eff;--green:#34d399;--orange:#f7a26e;
    --purple:#7c6ef7;--red:#f87171;--cyan:#22d3ee;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px}

  #topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:100;gap:12px}
  #topbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
  #topbar .sep{width:1px;height:24px;background:var(--border)}
  #search{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;width:200px;outline:none}
  #search:focus{border-color:var(--purple)}
  .legend{display:flex;gap:10px;margin-left:auto;align-items:center}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text2);cursor:pointer;font-size:11px;transition:all .15s}
  .btn:hover{border-color:var(--purple);color:var(--text)}
  .btn.active{background:var(--purple);border-color:var(--purple);color:#fff}

  #canvas-wrap{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
  #canvas-wrap.grabbing{cursor:grabbing}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0}

  .node{position:absolute;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:box-shadow .2s,border-color .2s;overflow:hidden}
  .node:hover{border-color:var(--purple);box-shadow:0 0 20px rgba(124,110,247,.15)}
  .node.selected{border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,110,247,.3)}
  .node-header{padding:8px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);font-weight:600;font-size:12px}
  .node-header .icon{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .node-body{padding:6px 12px 8px}
  .node-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:500;margin:1px 2px}
  .node-detail{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}

  .group{position:absolute;border-radius:12px;border:1px dashed var(--border);background:rgba(19,19,29,.5);transition:opacity .3s}
  .group-label{position:absolute;top:-12px;left:14px;padding:3px 10px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-radius:5px}
  .group-label .collapse-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 4px;margin-left:4px;line-height:1}
  .group-label .collapse-btn:hover{color:var(--text)}
  .group.collapsed{opacity:.5}
  .group.collapsed .node{display:none}

  #connections{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
  .conn{stroke-width:1.2;fill:none;opacity:.35;transition:opacity .2s,stroke-width .2s}
  .conn.highlighted{opacity:1;stroke-width:2.5}

  #detail-panel{position:fixed;right:0;top:48px;width:340px;bottom:0;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s;z-index:90;overflow-y:auto}
  #detail-panel.open{transform:translateX(0)}
  #detail-panel .panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  #detail-panel .panel-header h2{font-size:14px;font-weight:700}
  #detail-panel .panel-header .close{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px}
  #detail-panel .panel-body{padding:16px}
  #detail-panel .dep-section{margin-bottom:14px}
  #detail-panel .dep-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px;font-weight:600}
  #detail-panel .dep-item{font-size:12px;color:var(--text2);padding:3px 0;cursor:pointer;display:flex;align-items:center;gap:5px}
  #detail-panel .dep-item:hover{color:var(--text)}
  #detail-panel .dep-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  #detail-panel .func-list{list-style:none}
  #detail-panel .func-list li{font-size:11px;color:var(--text2);padding:2px 0;font-family:'JetBrains Mono',monospace}

  #minimap{position:fixed;bottom:16px;right:16px;width:200px;height:130px;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:80;overflow:hidden}
  #minimap canvas{width:100%;height:100%}
  #minimap .viewport{position:absolute;border:1.5px solid var(--purple);border-radius:2px;pointer-events:none}

  #zoom-controls{position:fixed;bottom:16px;left:16px;display:flex;gap:4px;z-index:80}
  #zoom-controls .btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0}
  #zoom-label{position:fixed;bottom:52px;left:16px;font-size:10px;color:var(--text3);z-index:80;text-align:center;width:32px}

  .tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--text);pointer-events:none;z-index:200;max-width:300px;box-shadow:0 4px 16px rgba(0,0,0,.5)}

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="topbar">
  <h1>ConvoFlow Architecture</h1>
  <div class="sep"></div>
  <input type="text" id="search" placeholder="Search nodes... (Ctrl+K)">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>UI</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Logic</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Database</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>External</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Critical</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>Infra</div>
  </div>
  <div class="sep"></div>
  <button class="btn" onclick="fitAll()">Fit All</button>
  <button class="btn" id="btn-conn" onclick="toggleConnections()">Connections</button>
</div>

<div id="canvas-wrap">
  <div id="canvas"><svg id="connections"></svg></div>
</div>

<div id="detail-panel">
  <div class="panel-header">
    <span id="panel-icon" style="width:10px;height:10px;border-radius:50%"></span>
    <h2 id="panel-title">Node</h2>
    <button class="close" onclick="closePanel()">&times;</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="minimap"><canvas id="minimap-canvas" width="400" height="260"></canvas><div class="viewport" id="minimap-vp"></div></div>

<div id="zoom-controls">
  <button class="btn" onclick="zoomIn()">+</button>
  <button class="btn" onclick="zoomOut()">&minus;</button>
  <button class="btn" onclick="fitAll()" title="Fit all">⊙</button>
</div>
<div id="zoom-label">100%</div>

<div class="tooltip" id="tooltip" style="display:none"></div>

// ============================================================
// RENDERING ENGINE
// ============================================================
let scale=1,panX=0,panY=0;
let isDragging=false,dragStartX,dragStartY,panStartX,panStartY;
let selectedNode=null,showConnections=true;
const canvas=document.getElementById('canvas');
const canvasWrap=document.getElementById('canvas-wrap');
const svgEl=document.getElementById('connections');

let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
groups.forEach(g=>{minX=Math.min(minX,g.x);minY=Math.min(minY,g.y);maxX=Math.max(maxX,g.x+g.w);maxY=Math.max(maxY,g.y+g.h)});
nodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+n.w);maxY=Math.max(maxY,n.y+n.h)});
const pad=60;

function renderGroups(){
  groups.forEach(g=>{
    const el=document.createElement('div');
    el.className='group';el.id=g.id;
    el.style.cssText=`left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;border-color:${g.color}30`;
    el.innerHTML=`<div class="group-label" style="background:${g.color};color:#0d0d14;border:2px solid ${g.color}">${g.label} <span class="collapse-btn" onclick="event.stopPropagation();toggleGroup('${g.id}')" style="color:#0d0d14">−</span></div>`;
    canvas.appendChild(el);
  });
}

function renderNodes(){
  nodes.forEach(n=>{
    const el=document.createElement('div');
    el.className='node';el.id=n.id;
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px;border-color:${C[n.cat]}30;background:${BG[n.cat]}`;
    el.dataset.cat=n.cat;
    el.dataset.searchtext=`${n.name} ${n.purpose} ${n.funcs.join(' ')} ${(n.tags||[]).join(' ')}`.toLowerCase();
    el.innerHTML=`
      <div class="node-header"><div class="icon" style="background:${C[n.cat]}"></div><span>${n.name}</span></div>
      <div class="node-body">
        <div class="node-detail">${n.purpose.substring(0,90)}${n.purpose.length>90?'...':''}</div>
        ${n.tags?`<div style="margin-top:4px">${n.tags.map(t=>`<span class="node-tag" style="background:${C[n.cat]}20;color:${C[n.cat]}">${t}</span>`).join('')}</div>`:''}
      </div>`;
    el.addEventListener('click',()=>selectNode(n));
    el.addEventListener('mouseenter',e=>showTooltip(e,n));
    el.addEventListener('mouseleave',hideTooltip);
    canvas.appendChild(el);
  });
}

function nodeCenter(id){const n=nodes.find(x=>x.id===id);return n?{x:n.x+n.w/2,y:n.y+n.h/2}:{x:0,y:0}}

function edgePoint(n,angle){
  const hw=n.w/2,hh=n.h/2;
  const cos=Math.cos(angle),sin=Math.sin(angle);
  const absCos=Math.abs(cos),absSin=Math.abs(sin);
  const r=absCos>0.001&&absSin>0.001?Math.min(hw/absCos,hh/absSin):Math.sqrt(hw*hw+hh*hh);
  return{x:n.x+hw+cos*r*0.95,y:n.y+hh+sin*r*0.95};
}

function renderConnections(){
  if(!showConnections){svgEl.innerHTML='';return;}
  const bb={x:minX-100,y:minY-100,w:maxX-minX+200,h:maxY-minY+200};
  svgEl.setAttribute('viewBox',`${bb.x} ${bb.y} ${bb.w} ${bb.h}`);
  svgEl.style.width=bb.w+'px';svgEl.style.height=bb.h+'px';
  svgEl.style.left=bb.x+'px';svgEl.style.top=bb.y+'px';

  let defs='<defs>';
  Object.entries(C).forEach(([k,v])=>{
    defs+=`<marker id="a-${k}" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="${v}" opacity=".7"/></marker>`;
  });
  defs+='</defs>';

  let paths='';
  const cToK={};Object.entries(C).forEach(([k,v])=>cToK[v]=k);

  connections.forEach(([from,to,color])=>{
    const fc=nodeCenter(from),tc=nodeCenter(to);
    if(!fc.x&&!fc.y||!tc.x&&!tc.y) return;
    const sn=nodes.find(n=>n.id===from),tn=nodes.find(n=>n.id===to);
    const angle=Math.atan2(tc.y-fc.y,tc.x-fc.x);
    const sx=sn?edgePoint(sn,angle).x:fc.x;
    const sy=sn?edgePoint(sn,angle).y:fc.y;
    const tx=tn?edgePoint(tn,angle+Math.PI).x:tc.x;
    const ty=tn?edgePoint(tn,angle+Math.PI).y:tc.y;

    const mx=(sx+tx)/2,my=(sy+ty)/2;
    const pd=-(ty-sy)*.08,pd2=(tx-sx)*.08;
    const k=cToK[color]||'green';
    paths+=`<path class="conn" data-from="${from}" data-to="${to}" d="M${sx},${sy} Q${mx+pd},${my+pd2} ${tx},${ty}" stroke="${color}" marker-end="url(#a-${k})"/>`;
  });
  svgEl.innerHTML=defs+paths;
}

// ============================================================
// INTERACTION
// ============================================================
function applyTransform(){
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
  updateMinimap();
}

canvasWrap.addEventListener('mousedown',e=>{
  if(e.target.closest('.node')||e.target.closest('.group-label')||e.target.closest('.collapse-btn'))return;
  isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;panStartX=panX;panStartY=panY;
  canvasWrap.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{if(!isDragging)return;panX=panStartX+(e.clientX-dragStartX);panY=panStartY+(e.clientY-dragStartY);applyTransform()});
window.addEventListener('mouseup',()=>{isDragging=false;canvasWrap.classList.remove('grabbing')});

canvasWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvasWrap.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const d=e.deltaY>0?.92:1.08;
  const ns=Math.max(.08,Math.min(4,scale*d));
  const r=ns/scale;panX=mx-r*(mx-panX);panY=my-r*(my-panY);scale=ns;applyTransform();
},{passive:false});

function zoomIn(){scale=Math.min(4,scale*1.25);applyTransform()}
function zoomOut(){scale=Math.max(.08,scale/1.25);applyTransform()}
function fitAll(){
  const rect=canvasWrap.getBoundingClientRect();
  const cw=maxX-minX+pad*2,ch=maxY-minY+pad*2;
  scale=Math.min(rect.width/cw,rect.height/ch)*.92;
  panX=(rect.width-cw*scale)/2-(minX-pad)*scale;
  panY=(rect.height-ch*scale)/2-(minY-pad)*scale;
  applyTransform();
}

function selectNode(n){
  document.querySelectorAll('.node.selected').forEach(el=>el.classList.remove('selected'));
  selectedNode=n;
  const el=document.getElementById(n.id);if(el)el.classList.add('selected');
  document.querySelectorAll('.conn').forEach(c=>c.classList.toggle('highlighted',c.dataset.from===n.id||c.dataset.to===n.id));

  const panel=document.getElementById('detail-panel');
  document.getElementById('panel-title').textContent=n.name;
  document.getElementById('panel-icon').style.background=C[n.cat];

  let h=`<div class="dep-section"><div class="dep-label">Purpose</div><div style="font-size:12px;color:var(--text2);line-height:1.5">${n.purpose}</div></div>`;
  if(n.funcs&&n.funcs.length) h+=`<div class="dep-section"><div class="dep-label">Functions / Classes</div><ul class="func-list">${n.funcs.map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  if(n.outgoing&&n.outgoing.length){const d=n.outgoing.map(id=>nodes.find(x=>x.id===id)).filter(Boolean);
    h+=`<div class="dep-section"><div class="dep-label">Outgoing (${d.length})</div>${d.map(x=>`<div class="dep-item" onclick="navigateTo('${x.id}')"><div class="dot" style="background:${C[x.cat]}"></div>${x.name}</div>`).join('')}</div>`;}
  if(n.incoming&&n.incoming.length){const d=n.incoming.map(id=>nodes.find(x=>x.id===id)).filter(Boolean);
    h+=`<div class="dep-section"><div class="dep-label">Incoming (${d.length})</div>${d.map(x=>`<div class="dep-item" onclick="navigateTo('${x.id}')"><div class="dot" style="background:${C[x.cat]}"></div>${x.name}</div>`).join('')}</div>`;}
  if(n.tags&&n.tags.length) h+=`<div class="dep-section"><div class="dep-label">Tags</div><div>${n.tags.map(t=>`<span class="node-tag" style="background:${C[n.cat]}20;color:${C[n.cat]}">${t}</span>`).join(' ')}</div></div>`;
  document.getElementById('panel-body').innerHTML=h;panel.classList.add('open');
}

function closePanel(){document.getElementById('detail-panel').classList.remove('open');document.querySelectorAll('.node.selected').forEach(el=>el.classList.remove('selected'));document.querySelectorAll('.conn.highlighted').forEach(c=>c.classList.remove('highlighted'));selectedNode=null}

function navigateTo(id){const n=nodes.find(x=>x.id===id);if(!n)return;const rect=canvasWrap.getBoundingClientRect();panX=rect.width/2-(n.x+n.w/2)*scale;panY=rect.height/2-(n.y+n.h/2)*scale;applyTransform();selectNode(n)}

function showTooltip(e,n){const tt=document.getElementById('tooltip');tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY+14)+'px';tt.innerHTML=`<strong>${n.name}</strong><br><span style="color:${C[n.cat]}">${n.cat.toUpperCase()}</span><br><span style="color:var(--text2)">${n.purpose.substring(0,140)}${n.purpose.length>140?'...':''}</span>`}
function hideTooltip(){document.getElementById('tooltip').style.display='none'}

function toggleGroup(id){const g=groups.find(x=>x.id===id);if(!g)return;g.collapsed=!g.collapsed;const el=document.getElementById(id);
  if(g.collapsed){el.classList.add('collapsed');el.querySelector('.collapse-btn').textContent='+';nodes.filter(n=>n.group===id).forEach(n=>{const ne=document.getElementById(n.id);if(ne)ne.style.display='none'})}
  else{el.classList.remove('collapsed');el.querySelector('.collapse-btn').textContent='−';nodes.filter(n=>n.group===id).forEach(n=>{const ne=document.getElementById(n.id);if(ne)ne.style.display=''})}}

const searchInput=document.getElementById('search');
searchInput.addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.node').forEach(el=>{if(!q){el.style.opacity='';return}el.style.opacity=el.dataset.searchtext.includes(q)?'1':'.12'})});
document.addEventListener('keydown',e=>{(e.ctrlKey||e.metaKey)&&e.key==='k'&&(e.preventDefault(),searchInput.focus());e.key==='Escape'&&(closePanel(),searchInput.blur(),searchInput.value='',document.querySelectorAll('.node').forEach(el=>el.style.opacity=''))});

function toggleConnections(){showConnections=!showConnections;document.getElementById('btn-conn').classList.toggle('active',showConnections);renderConnections()}

function updateMinimap(){
  const mc=document.getElementById('minimap-canvas'),ctx=mc.getContext('2d'),mw=mc.width,mh=mc.height;
  const cw=maxX-minX+pad*2,ch=maxY-minY+pad*2,ms=Math.min(mw/cw,mh/ch)*.85;
  const mx2=(mw-cw*ms)/2,my2=(mh-ch*ms)/2;
  ctx.clearRect(0,0,mw,mh);ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,mw,mh);
  groups.forEach(g=>{ctx.strokeStyle='#2a2a3a';ctx.lineWidth=1;ctx.strokeRect(mx2+(g.x-minX+pad)*ms,my2+(g.y-minY+pad)*ms,g.w*ms,g.h*ms)});
  nodes.forEach(n=>{ctx.fillStyle=C[n.cat]+'50';ctx.fillRect(mx2+(n.x-minX+pad)*ms,my2+(n.y-minY+pad)*ms,n.w*ms,n.h*ms)});
  const rect=canvasWrap.getBoundingClientRect();
  const vpw=rect.width/scale,vph=rect.height/scale;
  const vpx=(-panX/scale-minX+pad)*ms+mx2,vpy=(-panY/scale-minY+pad)*ms+my2;
  const vp=document.getElementById('minimap-vp');
  vp.style.left=(vpx/mw*100)+'%';vp.style.top=(vpy/mh*100)+'%';
  vp.style.width=(vpw*ms/mw*100)+'%';vp.style.height=(vph*ms/mh*100)+'%';
}

canvasWrap.addEventListener('click',e=>{if(!e.target.closest('.node')&&!e.target.closest('.group'))closePanel()});

// ============================================================
// INIT
// ============================================================
renderGroups();renderNodes();renderConnections();
document.getElementById('btn-conn').classList.add('active');
setTimeout(fitAll,100);
</script>
</body>
</html>
